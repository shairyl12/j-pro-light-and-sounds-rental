<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J-PRO | Admin Access</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: url('images/background.jpg') no-repeat center center fixed; background-size: cover; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .form-card { 
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); padding: 40px; border-radius: 20px; 
            width: 360px; text-align: center; border: 2px solid #FFD600; color: white; 
        }
        h2 { color: #FFD600; text-transform: uppercase; letter-spacing: 2px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 11px; color: #FFD600; margin-bottom: 8px; font-weight: bold; }
        .input-group input { 
            width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 214, 0, 0.3); border-radius: 5px; color: white; box-sizing: border-box; 
        }
        .btn-admin { 
            width: 100%; padding: 14px; background: #FFD600; color: #000; border: none; 
            border-radius: 5px; font-weight: bold; cursor: pointer; 
        }
        .btn-admin:hover { background: white; }
        .switch-link a { color: #FFD600; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Admin Portal</h2>
        <p style="font-size: 12px; color: #888; margin-bottom: 20px;">Restricted Access</p>
        <form id="adminForm">
            <div class="input-group">
                <label>ADMIN USERNAME</label>
                <input type="text" id="adminUser" required>
            </div>
            <div class="input-group">
                <label>SECURITY KEY</label>
                <input type="password" id="adminKey" required>
            </div>
            <button type="submit" class="btn-admin">ENTER DASHBOARD</button>
        </form>
        <p class="switch-link" style="margin-top:20px;"><a href="login.html">Return to Customer Login</a></p>
    </div>
</body>
</html>
